<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вероника, с днём рождения! 🎉</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #FBF3E7;
    --cream-deep: #F3E6D3;
    --ink: #4A3A2E;
    --rose: #E8AEB3;
    --caramel: #D9A46A;
    --gold: #C9A44B;
    --peach: #EFCBA5;
    --terracotta: #B9836F;
    --mint: #9CBB94;
    --sky: #A7C7E7;
    --lilac: #C9B6E4;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--cream);
    font-family:'Nunito', sans-serif;
    overflow:hidden;
  }
  #stage{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 20% 15%, #ffffffcc, transparent 40%),
      radial-gradient(circle at 85% 85%, #ffffff99, transparent 45%),
      radial-gradient(circle at 50% 100%, var(--peach)55, transparent 55%),
      radial-gradient(circle at 10% 90%, var(--rose)33, transparent 45%),
      var(--cream);
    overflow:hidden;
  }

  /* ---------- TWINKLING STARS ---------- */
  .star{
    position:absolute;
    border-radius:50%;
    background: var(--gold);
    opacity:0;
    pointer-events:none;
    animation: twinkle 3.2s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0; transform:scale(.4); }
    50%{ opacity:.85; transform:scale(1.15); }
  }

  /* ---------- START SCREEN ---------- */
  #start-screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:28px;
    transition: opacity .7s ease, visibility .7s ease;
    z-index:20;
  }
  #start-screen.hidden{ opacity:0; visibility:hidden; pointer-events:none; }
  .eyebrow{
    letter-spacing:.35em;
    font-size:12px;
    font-weight:700;
    color:var(--terracotta);
    text-transform:uppercase;
  }
  #start-btn{
    font-family:'Playfair Display', serif;
    font-weight:900;
    font-size:34px;
    letter-spacing:.12em;
    color:var(--ink);
    background: linear-gradient(180deg, #ffffff, var(--peach));
    border:2px solid var(--caramel);
    padding:22px 56px;
    border-radius:100px;
    cursor:pointer;
    box-shadow: 0 10px 0 var(--caramel), 0 16px 24px rgba(0,0,0,.12);
    animation: idleBounce 2.4s ease-in-out infinite;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  #start-btn:hover{ transform: translateY(-2px); }
  #start-btn:active{
    transform: translateY(6px);
    box-shadow: 0 4px 0 var(--caramel), 0 8px 14px rgba(0,0,0,.12);
  }
  @keyframes idleBounce{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-8px); }
  }

  /* ---------- CAKE SCENE ---------- */
  #scene{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:flex-end;
    padding-bottom:6vh;
    opacity:0;
    transition: opacity .6s ease;
  }
  #scene.visible{ opacity:1; }

  #cake-wrap{
    position:relative;
    width:min(340px, 78vw);
    display:flex; flex-direction:column-reverse;
    align-items:center;
  }
  .plate{
    width:112%;
    height:16px;
    background: linear-gradient(180deg,#fff, #e9ddca);
    border-radius:50%;
    box-shadow: 0 6px 14px rgba(0,0,0,.15);
    margin-bottom:-4px;
  }
  .layer{
    position:relative;
    height:32px;
    border-radius:10px 10px 4px 4px;
    display:flex; align-items:center; justify-content:center;
    color:#fff;
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:clamp(10px, 3.1vw, 13px);
    white-space:nowrap;
    padding:0 6px;
    text-shadow: 0 1px 2px rgba(0,0,0,.25);
    opacity:0;
    transform: translateY(18px) scale(.9);
    transition: opacity .45s ease, transform .45s cubic-bezier(.34,1.56,.64,1);
    border-bottom:3px solid rgba(0,0,0,.12);
    margin-top:-2px;
  }
  .layer.show{ opacity:1; transform: translateY(0) scale(1); }
  .layer::before{
    content:"";
    position:absolute;
    top:-3px; left:0; right:0; height:6px;
    background: rgba(255,255,255,.45);
    border-radius:8px;
  }

  .candle{
    width:8px;
    height:36px;
    background: repeating-linear-gradient(45deg, var(--mint), var(--mint) 4px, #fff 4px, #fff 8px);
    border-radius:3px;
    margin-bottom:-2px;
    opacity:0;
    transform: translateY(14px);
    transition: opacity .5s ease, transform .5s ease;
    position:relative;
  }
  .candle.show{ opacity:1; transform:translateY(0); }
  .flame{
    position:absolute;
    top:-16px; left:50%;
    width:12px; height:16px;
    transform: translateX(-50%);
    background: radial-gradient(circle at 50% 70%, #fff5c2, #ffb84d 55%, #ff7a3c 90%);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    animation: flicker 1.1s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{ transform: translateX(-50%) scale(1) rotate(-2deg); }
    50%{ transform: translateX(-50%) scale(1.12) rotate(3deg); }
  }

  /* ---------- FIREWORKS ---------- */
  .spark{
    position:absolute;
    width:7px; height:7px;
    border-radius:50%;
    top:0; left:0;
    pointer-events:none;
  }

  /* ---------- GREETING CARD ---------- */
  #greeting{
    position:absolute;
    inset:0;
    display:flex; align-items:flex-start; justify-content:center;
    padding:24px;
    padding-top:6vh;
    padding-bottom:6vh;
    opacity:0;
    visibility:hidden;
    transition: opacity .9s ease, visibility .9s ease;
    z-index:30;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }
  #greeting.visible{ opacity:1; visibility:visible; }
  #greeting .card{
    position:relative;
    background: rgba(255,251,244,.94);
    border:1.5px solid transparent;
    background-clip: padding-box;
    border-radius:24px;
    padding:40px 34px 34px;
    max-width:440px;
    text-align:center;
    box-shadow: 0 24px 60px rgba(80,50,20,.22);
    animation: cardPop .7s cubic-bezier(.34,1.56,.64,1);
  }
  #greeting .card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:26px;
    padding:2px;
    background: linear-gradient(120deg, var(--gold), var(--rose), var(--sky), var(--lilac), var(--gold));
    background-size: 300% 300%;
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: borderGlow 6s ease infinite;
    z-index:-1;
  }
  @keyframes borderGlow{
    0%,100%{ background-position:0% 50%; }
    50%{ background-position:100% 50%; }
  }
  @keyframes cardPop{
    0%{ opacity:0; transform:scale(.85) translateY(10px); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  #greeting h1{
    font-family:'Playfair Display', serif;
    font-size:32px;
    margin:0 0 12px;
    background: linear-gradient(90deg, var(--terracotta), var(--gold), var(--rose), var(--terracotta));
    background-size:300% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation: shimmer 5s linear infinite;
  }
  @keyframes shimmer{
    0%{ background-position:0% 50%; }
    100%{ background-position:300% 50%; }
  }
  #greeting p{
    font-size:16px;
    line-height:1.6;
    color:#6b5847;
    margin:0;
  }
  .photo-strip{
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
    margin:6px 0 20px;
  }
  .photo-strip:empty{ display:none; }
  .polaroid{
    background:#fff;
    padding:6px 6px 12px;
    border-radius:4px;
    box-shadow: 0 8px 16px rgba(80,50,20,.18);
    width:84px;
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .polaroid:nth-child(odd){ transform: rotate(-4deg); }
  .polaroid:nth-child(even){ transform: rotate(3deg); }
  .polaroid:hover{
    transform: scale(1.12) rotate(0deg) !important;
    box-shadow: 0 14px 26px rgba(80,50,20,.3);
    z-index:5;
  }
  .polaroid img{
    display:block;
    width:100%;
    height:84px;
    object-fit:cover;
    border-radius:2px;
  }

  /* ---------- CONFETTI ---------- */
  .confetti{
    position:absolute;
    top:-20px;
    width:8px;
    height:14px;
    opacity:.95;
    pointer-events:none;
    z-index:25;
    animation-name: confettiFall;
    animation-timing-function: linear;
    animation-iteration-count: 1;
  }
  @keyframes confettiFall{
    0%{ transform: translateY(0) rotate(0deg); opacity:1; }
    100%{ transform: translateY(110vh) rotate(540deg); opacity:.9; }
  }
  #restart-btn{
    margin-top:22px;
    background:none;
    border:none;
    color:var(--terracotta);
    font-weight:700;
    font-size:13px;
    letter-spacing:.08em;
    text-transform:uppercase;
    cursor:pointer;
    border-bottom:1px solid var(--terracotta);
    padding:2px 0;
  }
</style>
</head>
<body>

<div id="stage">

  <div id="start-screen">
    <div class="eyebrow">Нажми, чтобы начать</div>
    <button id="start-btn">START</button>
  </div>

  <div id="scene">
    <div id="cake-wrap">
      <div class="candle" id="candle"><div class="flame"></div></div>
      <!-- коржі з фразами додаються через JS, від найбільшого до найменшого -->
    </div>
  </div>

  <div id="greeting">
    <div class="card">
      <h1 id="greeting-title">Вероника, с днём рождения! 🎉</h1>
      <div id="photo-strip" class="photo-strip"></div>
      <p id="greeting-text"></p>
      <button id="restart-btn">Ещё раз ✨</button>
    </div>
  </div>

</div>

CONFIG.photos.forEach(src=>{
  const frame = document.createElement('div');
  frame.className = 'polaroid';

const cakeWrap = document.getElementById('cake-wrap');
const candle = document.getElementById('candle');
const total = CONFIG.phrases.length;

// container is flex-direction: column-reverse, so the FIRST DOM child
// ends up visually at the BOTTOM, and the LAST DOM child ends up on TOP.
// Order we want, bottom -> top: plate, layer0 (largest) ... layer14 (smallest), candle.

const plate = document.createElement('div');
plate.className = 'plate';
cakeWrap.appendChild(plate);

// top tier stays fairly wide (42%) so short phrases like "Ти улюблена" still fit on one line
const widthStart = 100, widthEnd = 42;
for(let i=0;i<total;i++){
  const layer = document.createElement('div');
  layer.className = 'layer';
  const w = widthStart - (widthStart-widthEnd) * (i/(total-1));
  layer.style.width = w + '%';
  layer.style.background = `linear-gradient(180deg, ${CONFIG.layerColors[i % CONFIG.layerColors.length]}, ${shade(CONFIG.layerColors[i % CONFIG.layerColors.length], -12)})`;
  layer.textContent = CONFIG.phrases[i];
  layer.dataset.index = i;
  cakeWrap.appendChild(layer);
}

cakeWrap.appendChild(candle); // topmost element

function shade(hex, percent){
  const num = parseInt(hex.replace('#',''),16);
  let r = (num>>16) + percent, g = (num>>8 & 0x00FF)+percent, b=(num & 0x0000FF)+percent;
  r = Math.max(Math.min(255,r),0); g = Math.max(Math.min(255,g),0); b = Math.max(Math.min(255,b),0);
  return '#' + (0x1000000 + r*0x10000 + g*0x100 + b).toString(16).slice(1);
}

// ---- twinkling background stars ----
(function spawnStars(){
  const stageEl = document.getElementById('stage');
  const starColors = ['var(--gold)','var(--rose)','var(--sky)','var(--lilac)'];
  for(let i=0;i<38;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = 2 + Math.random()*3;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.background = starColors[Math.floor(Math.random()*starColors.length)];
    s.style.animationDelay = (Math.random()*3)+'s';
    s.style.animationDuration = (2.4+Math.random()*2.4)+'s';
    stageEl.appendChild(s);
  }
})();

// ---- gentle falling confetti ----
function launchConfetti(){
  const w = stage.clientWidth;
  const shapes = ['50%','2px','50% 2px 50% 2px'];
  for(let i=0;i<CONFIG.confettiCount;i++){
    setTimeout(()=>{
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*w+'px';
      c.style.background = CONFIG.fireworkColors[Math.floor(Math.random()*CONFIG.fireworkColors.length)];
      c.style.borderRadius = shapes[Math.floor(Math.random()*shapes.length)];
      const dur = 2.6 + Math.random()*2.2;
      c.style.animationDuration = dur+'s';
      stage.appendChild(c);
      setTimeout(()=> c.remove(), dur*1000 + 100);
    }, i*35);
  }
}

const startBtn = document.getElementById('start-btn');
const startScreen = document.getElementById('start-screen');
const scene = document.getElementById('scene');
const stage = document.getElementById('stage');
const greeting = document.getElementById('greeting');
const restartBtn = document.getElementById('restart-btn');

function launchFirework(cx, cy){
  const colors = CONFIG.fireworkColors;
  const count = CONFIG.fireworkParticles;
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = (Math.PI*2*i)/count + Math.random()*0.2;
    const dist = 55 + Math.random()*60;
    const dx = Math.cos(angle)*dist;
    const dy = Math.sin(angle)*dist;
    s.style.left = cx+'px';
    s.style.top = cy+'px';
    s.style.background = colors[Math.floor(Math.random()*colors.length)];
    stage.appendChild(s);
    s.animate([
      { transform:'translate(0,0) scale(1)', opacity:1 },
      { transform:`translate(${dx}px, ${dy}px) scale(.3)`, opacity:0 }
    ], { duration: 900 + Math.random()*400, easing:'cubic-bezier(.2,.7,.3,1)' });
    setTimeout(()=> s.remove(), 1400);
  }
}

function runFireworks(){
  const w = stage.clientWidth, h = stage.clientHeight;
  for(let b=0; b<CONFIG.fireworkBursts; b++){
    setTimeout(()=>{
      const cx = w*0.25 + Math.random()*w*0.5;
      const cy = h*0.2 + Math.random()*h*0.3;
      launchFirework(cx, cy);
    }, b*450);
  }
}

function startShow(){
  startScreen.classList.add('hidden');
  scene.classList.add('visible');

  const layers = Array.from(document.querySelectorAll('.layer'));
  layers.forEach((layer, i)=>{
    setTimeout(()=> layer.classList.add('show'), i*CONFIG.layerStagger);
  });

  const candleDelay = total*CONFIG.layerStagger + 200;
  setTimeout(()=> candle.classList.add('show'), candleDelay);

  const fireworksDelay = candleDelay + 700;
  setTimeout(runFireworks, fireworksDelay);
  setTimeout(launchConfetti, fireworksDelay + 200);

  const greetingDelay = fireworksDelay + CONFIG.fireworkBursts*450 + 1200;
  setTimeout(()=>{
    greeting.classList.add('visible');
    launchConfetti();
    setTimeout(runFireworks, 300);
  }, greetingDelay);
}

startBtn.addEventListener('click', startShow);
restartBtn.addEventListener('click', ()=> location.reload());
</script>
